name: Fetch Movies and Anime Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Add this to allow pushing
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4  # Updated to v4
        with:
          node-version: '20'  # Updated to Node 20
          
      - name: Fetch and process data
        run: node fetch-data.js
        
      - name: Commit and push if changed
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update media data - $(date +'%Y-%m-%d %H:%M:%S')" && git push)
